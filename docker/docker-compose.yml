version: '3.9'

services:
  apkade:
    image: apkade:latest
    container_name: apkade
    restart: unless-stopped
    network_mode: host
    privileged: true
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      PORT: 3000
      REDROID_IMAGE: redroid/redroid:12.0.0-latest
      STREAMER_URL: http://127.0.0.1:8080
    volumes:
      - ../data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

  pion-streamer:
    build:
      context: ../sidecars/pion-streamer
      dockerfile: Dockerfile
    container_name: pion-streamer
    restart: unless-stopped
    network_mode: host